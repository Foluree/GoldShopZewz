<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width", initial-scale="1" />
    <title>Личный кабинет</title>
    <style>
        :root  {
            --bg: #0f172a;
            --panel: #111827;
            --card: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #f59e0b;
            --border: rgba(255, 255, 255, .08);
        }
        * {box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, system-ui, --apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: radial-gradient(circle at top, #1e293b, var(--bg));
            color: var(--text);
        }
        .container { max-width: 980px; margin: 0 auto; padding: 32px 16px 56px; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
        }
        h1, h2 { margin: 0 0 14px; }
        .meta {color: var(--muted); margin: 6px 0;}
        .points {
            display: inline-block;
            margin-top: 10px;
            background: rgba(245, 158, 11, .16);
            border-radius: 999px;
            color: var(--accent);
            font-weight: 700;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }
        th, td {
            border-bottom: 1px solid var(--border);
            text-align: left;
            padding: 10px 8px;
            font-size: 14px;
        }
        th { color:var(--muted); font-weight: 600; }
        tr:last-child td { border-bottom: 0; }
        .back { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <section class="panel">
            <h2>История покупок</h2>
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Товар</th>
                        <th>Кол-во</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in profile.purchasesAll %}
                    <tr>
                        <td>{{ p.bayitem_at }}</td>
                        <td>{{ p.title }}</td>
                        <td>{{ p.quantity }}</td>
                        <td>{{ "%.2f"|format(p.total_price) }} €</td>
                        <td>{{ p.status }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
        <a class="back" href="/">← На главную</a>
    </div>
</body>
