<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autorization - Split Reality</title>
    <style>
        :root {
            --bg: #0f1220;
            --panel: #171b2e;
            --text: #e9ecff;
            --muted: #9ca7d1;
            --accent: #7f9dff;
            --success: #47d3a6;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 10% 10%, #232949 0%, var(--bg) 35%, #0a0d18 100%);
        }

        .layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            min-height: 100vh;
        }

        .world {
            position: relative;
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,.08);
            isolation: isolate;
        }

        .orbs, .overlay {
            position: absolute;
            inset: 0;
        }

        .orb {
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(127,157,255,.65), rgba(127,157,255,.05));
            filter: blur(2px);
            transition: transform .6s ease, opacity .6s ease;
            opacity: .25;
        }

        .orb.one {  top: 14%; left: 12%; }
        .orb.two { top:52%; left:36% }
        .orb.three { top:20%; left:62%; }

        .grid { 
            position: absolute;
            inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at center, black 35%, transparent 95%);
            opacity: .45;
            transform: scale(1.06);
            transition: opacity .5s ease, transform .8s ease;
        }

        .caption {
            position: absolute;
            left: 48px;
            bottom: 42px;
            max-width: 460px;
            z-index: 2;
        }

        .caption h1 {
            margin: 0 0 12px;
            font-size: clamp(1.8rem, 3.2vw, 3rem);
            line-height: 1.1;
        }

        .caption p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .overlay {
            z-index: 3;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(12,14,26,.15),rgba(12,14,26,.75));
            opacity:.3;
            transition: opacity .5s ease, background .5s ease;
        }

        .auth {
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, rgba(23,27,46,.95),rgba(12,14,26,.98));
            padding:36px;
        }

        .card {
            width: min(420px, 100%);
            background: rgba(255,255,255,.02);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 18px;
            padding:28px;
            backdrop-filter: blur(6px);
           }

        .card h2 { margin: 0 0 8px; }
        .card .subtitle { margin: 0 0 22px; color: var(--muted); font-size: .95rem; }
        .field { margin-bottom: 14px; }
        .label { display: block; margin-bottom: 6px; color: #c7d2ff; font-size: .9rem; }
        input {
            width: 100%;
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 12px;
            background: rgba(255,255,255,.03);
            color: var(--text);
            padding: 12px 14px;
            font-size: 1rem;
            outline: none;
            transition: border-color .25s ease, box-shadow .25s ease;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(127,157,255,.2);
        }
        .btn {
            width: 100%;
            border: 0;
            border-radius: 12px;
            padding: 12px 14px;
            color: white;
            background: linear-gradient(90deg, #698bff, #9f74ff);
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
        }
        .hint { margin-top: 14px; font-size: .9rem; }
        .world.email .grid { opacity: .8; transform: scale(1); }
        .world.email .grid { opacity:.8;transform:scale(1); }
        
        .world.email .orb {
            opacity:.55;
            transform:translateY(-8px); 
        }
        .world.password .overlay{ 
            opacity:.08;
            background: linear-gradient(120deg,rgba(114,84,255,.06),rgba(84,203,255,.2));
        }

        .world.password .orb.two {
            transform: scale(1.18);
            opacity:.78;
        }

        .world.error {
            filter: grayscale(.35);
        }

        .world.error .overlay{
            opacity:.72;
            background:linear-gradient(120deg,rgba(62,17,30,.7),rgba(14,16,22,.9));
        }

        .world.error .orb { opacity:.08; transform: scale(.85); }
        @media (max-width: 900px) {
            .layout { grid-template-columns:1fr; }
            .world { min-height: 44vh; border-right: 0; border-bottom: 1px solid rgba(255,255,255,.08); }
        }
    </style>
</head>
<body>
    <div class="layout">
        <section class="world" id="worldScene">
            <div class="orbs">
                <div class="orb one"></div>
                <div class="orb two"></div>
                <div class="orb three"></div>
            </div>
            <div class="grid"></div>
            <div class="overlay"></div>
            <div class="caption">
                <h1>Split Reality</h1>
                <p>Слева мир, который реагирует на твои действия. Справа - строгий вход в систему.</p>
            </div>
        </section>

        <section class="auth">
            <form class="card" id="loginFrom" autocomplete="off">
                <h2>Enterence</h2>
                <p class="subtitle">Черный экран авторизации без серверной проверки.</p>
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="••••••••" />
                </div>

                <button type="submit" class="btn">Login</button>
                <p class="hint" id="statusHint">Начни вводить email, чтобы «собрать» сцену.</p>
            </form>
        </section>
    </div>

    <script>
        const world = document.getElementById('worldScene');
        const form = document.getElementById('loginFrom');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const hint = document.getElementById('statusHint');

        function updateScense() {
            world.classList.toggle('email',email.value.trim().length > 0);
            world.classList.toggle('password',password.value.trim().length > 0);

            if (!world.classList.contains('error')) {
                if (password.value.trim()) {
                    hint.textContent = 'Пароль активировал свет и движение сцены.';
                } else if (email.value.trim()) {
                    hint.textContent = 'Email начинает собирать мир вокруг формы.';
                } else {
                    hint.textContent = 'Начни вводить email, чтобы «собрать» сцену.';
                }
            }
        }

        email.addEventListener('input', updateScense);
        password.addEventListener('input', updateScense);

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const hasError = !email.value.trim() || !password.value.trim();

            world.classList.toggle('error', hasError);
            if (hasError) {
                hint.textContent = 'Ошибка: заполни оба поля. Мир временно «ломается». ';
                return;
            }

            hint.textContent = 'Демо: форма заполнена. Проверка на сервере пока отключена.';
            setTimeout(() => world.classList.remove('error'), 350);
        });
    </script>
</body>
</html>
